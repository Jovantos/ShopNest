<!DOCTYPE html>
<html>
<head>
    <style>
        .logo-container {
            width: 200px;
            height: 200px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .cart {
            font-size: 120px;
            color: #4a90e2;
            position: relative;
            transform: rotate(-15deg);
        }
        .sn-text {
            position: absolute;
            font-family: 'Arial', sans-serif;
            font-weight: 900;
            font-size: 45px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transform: rotate(-15deg);
            letter-spacing: 2px;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <i class="fas fa-shopping-cart cart"></i>
        <div class="sn-text">SN</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
